# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: aragon-indexer
description: Aragon DAO Protocol Indexer

field_selection:
  transaction_fields:
    - hash
    - transactionIndex
    - from
    - to

contracts:
  # =============================================
  # Phase 1: Core Registry Contracts (known addresses)
  # =============================================
  - name: DAORegistry
    events:
      - event: DAORegistered(address indexed dao, address indexed creator, string subdomain)

  - name: PluginRepoRegistry
    events:
      - event: PluginRepoRegistered(string subdomain, address pluginRepo)

  - name: PluginSetupProcessor
    events:
      - event: InstallationPrepared(address indexed sender, address indexed dao, bytes32 preparedSetupId, address indexed pluginSetupRepo, (uint8, uint16) versionTag, bytes data, address plugin, (address[], (uint8, address, address, address, bytes32)[]) preparedSetupData)
      - event: InstallationApplied(address indexed dao, address indexed plugin, bytes32 preparedSetupId, bytes32 appliedSetupId)
      - event: UpdatePrepared(address indexed sender, address indexed dao, bytes32 preparedSetupId, address indexed pluginSetupRepo, (uint8, uint16) versionTag, (address, address[], bytes) setupPayload, (address[], (uint8, address, address, address, bytes32)[]) preparedSetupData, bytes initData)
      - event: UpdateApplied(address indexed dao, address indexed plugin, bytes32 preparedSetupId, bytes32 appliedSetupId)
      - event: UninstallationPrepared(address indexed sender, address indexed dao, bytes32 preparedSetupId, address indexed pluginSetupRepo, (uint8, uint16) versionTag, (address, address[], bytes) setupPayload, (uint8, address, address, address, bytes32)[] permissions)
      - event: UninstallationApplied(address indexed dao, address indexed plugin, bytes32 preparedSetupId)

  # =============================================
  # Phase 1: DAO Contract (factory-registered from DAORegistered)
  # =============================================
  - name: DAO
    events:
      - event: MetadataSet(bytes metadata)
      - event: NativeTokenDeposited(address sender, uint256 amount)
      - event: "Granted(bytes32 indexed permissionId, address indexed here, address where, address indexed who, address condition)"
      - event: "Revoked(bytes32 indexed permissionId, address indexed here, address where, address indexed who)"
      - event: "Executed(address indexed actor, bytes32 callId, (address, uint256, bytes)[] actions, uint256 allowFailureMap, uint256 failureMap, bytes[] execResults)"

  # =============================================
  # Phase 2: Governance Plugin Contracts (factory-registered)
  # =============================================
  - name: Multisig
    events:
      - event: MultisigSettingsUpdated(bool onlyListed, uint16 indexed minApprovals)
      - event: MembersAdded(address[] members)
      - event: MembersRemoved(address[] members)
      - event: "ProposalCreated(uint256 indexed proposalId, address indexed creator, uint64 startDate, uint64 endDate, bytes metadata, (address, uint256, bytes)[] actions, uint256 allowFailureMap)"
        name: MultisigProposalCreated
      - event: ProposalExecuted(uint256 indexed proposalId)
        name: MultisigProposalExecuted
      - event: Approved(uint256 indexed proposalId, address indexed approver)

  - name: TokenVoting
    events:
      - event: VotingSettingsUpdated(uint8 votingMode, uint32 supportThreshold, uint32 minParticipation, uint64 minDuration, uint256 minProposerVotingPower)
      - event: "ProposalCreated(uint256 indexed proposalId, address indexed creator, uint64 startDate, uint64 endDate, bytes metadata, (address, uint256, bytes)[] actions, uint256 allowFailureMap)"
        name: TokenVotingProposalCreated
      - event: ProposalExecuted(uint256 indexed proposalId)
        name: TokenVotingProposalExecuted
      - event: VoteCast(uint256 indexed proposalId, address indexed voter, uint8 voteOption, uint256 votingPower)

  - name: StagedProposalProcessor
    events:
      - event: ProposalResultReported(uint256 indexed proposalId, uint16 indexed stageId, address indexed body)
      - event: ProposalCanceled(uint256 indexed proposalId, uint16 indexed stageId, address indexed sender)
      - event: "ProposalEdited(uint256 indexed proposalId, uint16 indexed stageId, address indexed sender, bytes metadata, (address, uint256, bytes)[] actions)"
      - event: ProposalAdvanced(uint256 indexed proposalId, uint16 indexed stageId, address indexed sender)
      - event: "ProposalCreated(uint256 indexed proposalId, address indexed creator, uint64 startDate, uint64 endDate, bytes metadata, (address, uint256, bytes)[] actions, uint256 allowFailureMap)"
        name: SPPProposalCreated
      - event: ProposalExecuted(uint256 indexed proposalId)
        name: SPPProposalExecuted
      - event: MetadataSet(bytes metadata)
        name: SPPMetadataSet
      - event: "StagesUpdated(((address, bool, bool, uint8)[], uint64, uint64, uint64, uint16, uint16, bool, bool)[] stages)"

  # =============================================
  # Phase 3: Governance Token Contracts (factory-registered)
  # =============================================
  - name: GovernanceERC20
    events:
      - event: DelegateChanged(address indexed delegator, address indexed fromDelegate, address indexed toDelegate)
      - event: DelegateVotesChanged(address indexed delegate, uint256 previousBalance, uint256 newBalance)

  # =============================================
  # Phase 3: VE Governance Contracts (factory-registered via RPC discovery)
  # =============================================
  - name: VotingEscrow
    events:
      - event: Deposit(address indexed depositor, uint256 indexed tokenId, uint256 indexed startTs, uint256 value, uint256 newTotalLocked)
      - event: Withdraw(address indexed depositor, uint256 indexed tokenId, uint256 value, uint256 ts, uint256 newTotalLocked)
      - event: MinDepositSet(uint256 minDeposit)
      - event: TokensDelegated(address indexed sender, address indexed delegatee, uint256[] tokenIds)
      - event: TokensUndelegated(address indexed sender, address indexed delegatee, uint256[] tokenIds)

  - name: ExitQueue
    events:
      - event: ExitQueued(uint256 indexed tokenId, address indexed holder, uint256 exitDate)
      - event: ExitQueuedV2(uint256 indexed tokenId, address indexed holder, uint48 queuedAt)
      - event: ExitCancelled(uint256 indexed tokenId, address indexed holder)
      - event: MinLockSet(uint48 minLock)
      - event: ExitFeePercentAdjusted(uint256 maxFeePercent, uint256 minFeePercent, uint48 minCooldown, uint8 feeType)

  - name: LockManager
    events:
      - event: BalanceLocked(address indexed voter, uint256 amount)
      - event: BalanceUnlocked(address indexed voter, uint256 amount)

  - name: LockToVote
    events:
      - event: VoteCast(uint256 indexed proposalId, address indexed voter, uint8 voteOption, uint256 votingPower)
        name: LockToVoteVoteCast
      - event: VoteCleared(uint256 indexed proposalId, address indexed voter)
      - event: "ProposalCreated(uint256 indexed proposalId, address indexed creator, uint64 startDate, uint64 endDate, bytes metadata, (address, uint256, bytes)[] actions, uint256 allowFailureMap)"
        name: LockToVoteProposalCreated
      - event: ProposalExecuted(uint256 indexed proposalId)
        name: LockToVoteProposalExecuted
      - event: VotingSettingsUpdated(uint8 votingMode, uint32 supportThresholdRatio, uint32 minParticipationRatio, uint32 minApprovalRatio, uint64 proposalDuration, uint256 minProposerVotingPower)
        name: LockToVoteSettingsUpdated

  # =============================================
  # Phase 4: Gauge Voting (factory-registered from gauge plugins)
  # =============================================
  - name: GaugeVoter
    events:
      - event: GaugeCreated(address indexed gauge, address indexed creator, string metadataURI)
      - event: GaugeActivated(address indexed gauge)
      - event: GaugeDeactivated(address indexed gauge)
      - event: GaugeMetadataUpdated(address indexed gauge, string metadataURI)
      - event: Voted(address indexed voter, address indexed gauge, uint256 indexed epoch, uint256 votingPowerCastForGauge, uint256 totalVotingPowerInGauge, uint256 totalVotingPowerInContract, uint256 timestamp)
      - event: Reset(address indexed voter, address indexed gauge, uint256 indexed epoch, uint256 votingPowerRemovedFromGauge, uint256 totalVotingPowerInGauge, uint256 totalVotingPowerInContract, uint256 timestamp)

  # =============================================
  # Phase 4: Capital Distribution (factory-registered from capitalDistributor plugins)
  # =============================================
  - name: CapitalDistributor
    events:
      - event: CampaignCreated(uint256 indexed campaignId, bytes metadataUri, address indexed allocationStrategy, address token, address actionEncoder, uint64 startTime, uint64 endTime)
      - event: MerkleCampaignSet(uint256 indexed campaignId, bytes32 merkleRoot)
      - event: MerkleCampaignUpdated(uint256 indexed campaignId, bytes32 oldMerkleRoot, bytes32 newMerkleRoot)
      - event: CampaignPaused(uint256 indexed campaignId)
      - event: CampaignResumed(uint256 indexed campaignId)
      - event: CampaignEnded(uint256 indexed campaignId)

  # =============================================
  # Phase 4: Execute Selector Condition (factory-registered from condition addresses)
  # =============================================
  - name: ExecuteSelectorCondition
    events:
      - event: SelectorAllowed(bytes4 selector, address where)
      - event: SelectorDisallowed(bytes4 selector, address where)
      - event: NativeTransfersAllowed(address where)
      - event: NativeTransfersDisallowed(address where)

